<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Background orbs -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-brand-500/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-brand-600/10 rounded-full blur-3xl animate-pulse" style="animation-delay:1s"></div>

  <div class="w-full max-w-md animate-fade-in z-10">
    <!-- Logo card -->
    <div class="glass-card p-8 text-center mb-6">
      <div class="w-16 h-16 bg-brand-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-brand-500/20">
        <lucide-angular [img]="icons.ShieldCheck" class="w-8 h-8 text-brand-500"></lucide-angular>
      </div>
      <h1 class="text-3xl font-bold mb-2">KubCompare</h1>
      <p class="text-gray-400">Enterprise Kubernetes Configuration Management</p>
    </div>

    <!-- Login form -->
    <div class="glass-card p-8">
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6" autocomplete="off">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
          <div class="relative flex items-center">
            <span class="absolute left-4 z-10">
              <lucide-angular [img]="icons.Mail" class="w-5 h-5 text-gray-500"></lucide-angular>
            </span>
            <input type="email" formControlName="email" class="glass-input-icon w-full" placeholder="name@company.com" autocomplete="off">
          </div>
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
             class="text-xs text-red-400 mt-1 ml-1">Please enter a valid email.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
          <div class="relative flex items-center">
            <span class="absolute left-4 z-10">
              <lucide-angular [img]="icons.Lock" class="w-5 h-5 text-gray-500"></lucide-angular>
            </span>
            <input type="password" formControlName="password" class="glass-input-icon w-full" placeholder="••••••••" autocomplete="new-password">
          </div>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
             class="text-xs text-red-400 mt-1 ml-1">Password must be at least 6 characters.</p>
        </div>

        <!-- Forgot password -->
        <div class="flex justify-end">
          <button type="button" (click)="goToForgotPassword()"
                  class="text-sm text-brand-500 hover:underline transition-colors">
            Forgot password?
          </button>
        </div>

        <button type="submit" [disabled]="isLoading"
                class="btn-primary w-full flex items-center justify-center gap-2">
          <lucide-angular *ngIf="!isLoading" [img]="icons.LogIn" class="w-5 h-5"></lucide-angular>
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        </button>
      </form>
    </div>

    <!-- Footer links -->
    <p class="text-center mt-6 text-gray-500 text-sm">
      No account?
      <button (click)="goToSignup()" class="text-brand-500 hover:underline font-medium ml-1">Register here</button>
    </p>
    <p class="text-center mt-3 text-gray-600 text-xs">Protected by Enterprise-Grade Security</p>
  </div>
</div>
