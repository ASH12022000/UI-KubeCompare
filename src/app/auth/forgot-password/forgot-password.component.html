<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-brand-500/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-brand-600/10 rounded-full blur-3xl animate-pulse" style="animation-delay:1s"></div>

  <div class="w-full max-w-md animate-fade-in z-10">

    <!-- Step 1: Request Reset -->
    <div *ngIf="step === 'request'">
      <div class="glass-card p-8 text-center mb-6">
        <div class="w-16 h-16 bg-brand-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-brand-500/20">
          <lucide-angular [img]="icons.Mail" class="w-8 h-8 text-brand-500"></lucide-angular>
        </div>
        <h1 class="text-2xl font-bold mb-2">Forgot Password</h1>
        <p class="text-gray-400 text-sm">Enter your email and we'll send a reset token</p>
      </div>

      <div class="glass-card p-8">
        <form [formGroup]="requestForm" (ngSubmit)="onRequestReset()" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
            <div class="relative flex items-center">
              <span class="absolute left-4 z-10">
                <lucide-angular [img]="icons.Mail" class="w-5 h-5 text-gray-500"></lucide-angular>
              </span>
              <input type="email" formControlName="email" class="glass-input-icon w-full" placeholder="name@company.com">
            </div>
            <p *ngIf="requestForm.get('email')?.invalid && requestForm.get('email')?.touched"
               class="text-xs text-red-400 mt-1 ml-1">Valid email required.</p>
          </div>

          <button type="submit" [disabled]="isLoading" class="btn-primary w-full flex items-center justify-center gap-2">
            <span *ngIf="!isLoading">Send Reset Token</span>
            <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Step 2: Enter Token + New Password -->
    <div *ngIf="step === 'reset'">
      <div class="glass-card p-8 text-center mb-6">
        <div class="w-16 h-16 bg-brand-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-brand-500/20">
          <lucide-angular [img]="icons.KeyRound" class="w-8 h-8 text-brand-500"></lucide-angular>
        </div>
        <h1 class="text-2xl font-bold mb-2">Reset Password</h1>
        <p class="text-gray-400 text-sm">Enter the token from your email and choose a new password</p>
      </div>

      <div class="glass-card p-8">
        <form [formGroup]="resetForm" (ngSubmit)="onResetPassword()" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
            <input type="email" formControlName="email" class="glass-input w-full" placeholder="name@company.com">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Reset Token</label>
            <div class="relative flex items-center">
              <span class="absolute left-4 z-10">
                <lucide-angular [img]="icons.KeyRound" class="w-5 h-5 text-gray-500"></lucide-angular>
              </span>
              <input type="text" formControlName="token" class="glass-input-icon w-full" placeholder="Paste token from email">
            </div>
            <p *ngIf="resetForm.get('token')?.invalid && resetForm.get('token')?.touched"
               class="text-xs text-red-400 mt-1 ml-1">Token is required.</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">New Password</label>
            <div class="relative flex items-center">
              <span class="absolute left-4 z-10">
                <lucide-angular [img]="icons.Lock" class="w-5 h-5 text-gray-500"></lucide-angular>
              </span>
              <input type="password" formControlName="newPassword" class="glass-input-icon w-full" placeholder="Min. 6 characters">
            </div>
            <p *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
               class="text-xs text-red-400 mt-1 ml-1">Password must be at least 6 characters.</p>
          </div>

          <button type="submit" [disabled]="isLoading" class="btn-primary w-full flex items-center justify-center gap-2">
            <span *ngIf="!isLoading">Reset Password</span>
            <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Back to Login -->
    <button (click)="goToLogin()"
            class="mt-6 w-full flex items-center justify-center gap-2 text-gray-500 hover:text-white text-sm transition-colors">
      <lucide-angular [img]="icons.ArrowLeft" class="w-4 h-4"></lucide-angular>
      Back to Sign In
    </button>
  </div>
</div>
